services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ponte_cachas}
      POSTGRES_USER: ${POSTGRES_USER:-ponte_cachas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ponte_cachas}
    ports:
      - "5432:5432"
    volumes:
      - ponte_cachas_pgdata:/var/lib/postgresql/data
    networks:
      - net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ponte_cachas} -d ${POSTGRES_DB:-ponte_cachas}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ponte_cachas}:${POSTGRES_PASSWORD:-ponte_cachas}@db:5432/${POSTGRES_DB:-ponte_cachas}
    ports:
      - "8000:8000"
    networks:
      - net
    depends_on:
      db:
        condition: service_healthy

volumes:
  ponte_cachas_pgdata:

# añadido porqué sino falla el deploy en render, dado que ahí la red 'localhost' no existe
networks:
  net:
    driver: bridge
